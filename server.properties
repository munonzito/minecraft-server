# Minecraft Server Properties - PaperMC
# https://papermc.io/docs/paper/velocity

# Basic Settings
server-name=Minecraft Server
motd=&aWelcome to our Server!\n&eVersion 1.21
server-port=25565
server-ip=

# Game Settings
gamemode=survival
difficulty=hard
allow-flight=false
spawn-protection=0
spawn-monsters=true
spawn-animals=true
spawn-npcs=true

# World Generation
level-name=world
level-seed=
level-type=minecraft:normal
generator-settings=
max-world-size=29999984

# Player Settings
max-players=10
white-list=false
enforce-whitelist=false
player-idle-timeout=0
rate-limit=0

# PvP Settings
pvp=true
allow-nether=true
enable-command-block=true
broadcast-console-to-ops=true
broadcast-rcon-to-ops=true

# Performance Settings
view-distance=10
simulation-distance=10

# Network Settings
network-compression-threshold=256
max-connections=5
hardcore=false
online-mode=true
enable-status=true
enable-query=false
query-port=25565

# Resource Pack Settings
resource-pack=
resource-pack-prompt=
resource-pack-sha1=
require-resource-pack=false
player-mission-filter=

# Other Settings
function-permission-level=4
initial-enabled-packs=vanilla
initial-disabled-packs=
level-embedded-segment=

# Bug Fixes & Optimizations (PaperMC specific)
enable-jmx-monitoring=false
sync-chunk-writes=true
use-native-transport-only=false
hide-online-players=false

# Max tick time - prevents server from hanging
max-tick-time=60000

# Preventions
prevent-proxy-connections=true
