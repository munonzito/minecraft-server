name: GTARace
version: '1.0.0'
main: com.gtarace.GTARacePlugin
api-version: '1.21'
description: GTA-style boat racing minigame
authors: [martinmunoz]

commands:
  race:
    description: GTA Race game commands
    usage: /<command> <join|start|stop|setstart|addcheckpoint|setcheckpoint|removecheckpoint|setfinish|addpowerup|removepowerup|status|leave>
    aliases: [gr]

permissions:
  gtarace.admin:
    description: Allows admin commands (start, stop, track setup)
    default: op
  gtarace.play:
    description: Allows playing the game (join, leave)
    default: true
