game:
  duration-seconds: 600
  respawn-delay-seconds: 10
  min-players: 1
  countdown-seconds: 10

arena:
  world: "world"
  red-spawn:
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 90.0
    pitch: 0.0
  blue-spawn:
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 270.0
    pitch: 0.0
  red-target:
    x: 0
    y: 64
    z: 0
  blue-target:
    x: 0
    y: 64
    z: 0

